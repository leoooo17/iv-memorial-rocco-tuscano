<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f6;
color:#222;
}

/* HERO */
header{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg")
center/cover no-repeat;
overflow:hidden;
}

header::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
  180deg,
  rgba(0,0,0,0.65),
  rgba(0,0,0,0.75)
);
backdrop-filter: blur(2px);
}

.hero-text{
position:relative;
z-index:2;
text-align:center;
padding:20px;
animation: fadeUp 1s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.hero-text h1{
font-size:64px;
color:white;
margin:0;
letter-spacing:2px;
text-transform:uppercase;
}

.hero-subtitle{
color:rgba(255,255,255,0.85);
max-width:750px;
margin:18px auto 0;
line-height:1.6;
font-size:18px;
}

/* MENU */
.menu{
position:sticky;
top:0;
background:rgba(255,255,255,0.85);
backdrop-filter: blur(10px);
z-index:999;
padding:10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

button{
padding:10px 16px;
border-radius:999px;
border:1px solid rgba(0,0,0,0.08);
background:white;
cursor:pointer;
font-weight:600;
transition:0.25s;
}

button:hover{
background:#FFD700;
transform:translateY(-3px);
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

/* GALLERY */
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
gap:12px;
padding:20px;
}

/* PHOTO CARD */
.photo-card{
position:relative;
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
transition:0.3s;
}

.photo-card img{
width:100%;
height:220px;
object-fit:cover;
cursor:pointer;
transition:0.4s;
}

.photo-card:hover img{
transform:scale(1.05);
}

.photo-card:hover{
transform:translateY(-5px);
}

/* DELETE BUTTON */
.delete-btn{
position:absolute;
top:8px;
right:8px;
padding:6px 8px;
font-size:12px;
border:none;
border-radius:8px;
background:#e74c3c;
color:white;
cursor:pointer;
}

/* LOGIN */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:2000;
padding:10px 14px;
background:#111;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#loginBox{
position:fixed;
top:55px;
left:10px;
z-index:2000;
background:#111;
padding:10px;
border-radius:10px;
display:none;
width:160px;
color:white;
}

#loginBox input{
width:100%;
padding:6px;
border:none;
border-radius:6px;
margin-bottom:6px;
font-size:12px;
}

#loginBox button{
width:100%;
padding:6px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* =========================
   INSTAGRAM + PH SIGNATURE
   ========================= */

/* Instagram torneo (top right) */
.ig-torneo{
position:fixed;
top:12px;
right:12px;
z-index:3000;
background:rgba(0,0,0,0.55);
color:white;
padding:10px 14px;
border-radius:999px;
text-decoration:none;
font-size:13px;
font-weight:600;
backdrop-filter: blur(10px);
transition:0.3s;
}

.ig-torneo:hover{
background:#E1306C;
transform:translateY(-2px);
}

/* PH fotografo (bottom right) */
.ph-signature{
position:fixed;
bottom:12px;
right:12px;
z-index:3000;
background:rgba(0,0,0,0.6);
color:white;
padding:10px 14px;
border-radius:999px;
font-size:13px;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
backdrop-filter: blur(10px);
transition:0.3s;
}

.ph-signature:hover{
transform:scale(1.05);
background:rgba(0,0,0,0.8);
}

</style>
</head>

<body>

<!-- INSTAGRAM TORNEO -->
<a class="ig-torneo"
   href="https://www.instagram.com/torneo_bovamarina2026?igsh=c3VhanNwd3d3cTlq"
   target="_blank">
📲 Instagram Torneo
</a>

<!-- PH FOTOGRAFO -->
<a class="ph-signature"
   href="https://www.instagram.com/alessio__orlando?igsh=MWZpcmFramlnMjU2OQ=="
   target="_blank">
📸 PH Alessio Orlando
</a>

<!-- MENU BUTTON -->
<button id="menuBtn" onclick="toggleLogin()">☰ Menu</button>

<!-- LOGIN BOX -->
<div id="loginBox">

<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>

<div id="uploadBox" style="display:none;margin-top:6px;">

<select id="folderSelect" style="width:100%">
<option value="08-06">08/06</option>
<option value="09-06">09/06</option>
<option value="10-06">10/06</option>
<option value="11-06">11/06</option>
<option value="12-06">12/06</option>
<option value="13-06">13/06</option>
<option value="15-06">15/06</option>
<option value="16-06">16/06</option>
<option value="17-06">17/06</option>
<option value="ottavi">OTTAVI</option>
<option value="quarti">QUARTI</option>
<option value="semifinale">SEMIFINALE</option>
<option value="finale">FINALE</option>
</select>

<button onclick="uploadPhoto()">📸 Carica</button>

</div>
</div>

<!-- HERO -->
<header>
  <div class="hero-text">
    <h1>IV MEMORIAL ROCCO TUSCANO</h1>

    <p class="hero-subtitle">
      Un torneo che unisce passione, sport e memoria.  
      Le emozioni in campo, catturate e condivise in tempo reale dal nostro fotografo ufficiale.
    </p>
  </div>
</header>

<!-- MENU CARTELLE -->
<div class="menu">
<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>
<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>
</div>

<!-- GALLERY -->
<div id="gallery"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBdcApiH4G4kuSUKxIxQhhmq_fiLNRerp8",
  authDomain: "memorial-rocco-tuscano.firebaseapp.com",
  projectId: "memorial-rocco-tuscano",
  storageBucket: "memorial-rocco-tuscano.firebasestorage.app",
  messagingSenderId: "72206140774",
  appId: "1:72206140774:web:ac817e3fcd7107e53e34a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFolder = "08-06";
let isAdmin = false;

function toggleLogin(){
const box = document.getElementById("loginBox");
box.style.display = (box.style.display === "block") ? "none" : "block";
}

function login(){
const pass = document.getElementById("pass").value;

if(pass === "alessio2026"){
isAdmin = true;
document.getElementById("uploadBox").style.display = "block";
alert("Accesso fotografo attivato");
render();
}else{
alert("Password errata");
}
}

function setFolder(f){
currentFolder = f;
render();
}

function render(){
const g = document.getElementById("gallery");
g.innerHTML = "";

db.collection("photos")
.where("tag","==",currentFolder)
.get()
.then(snapshot=>{

if(snapshot.empty){
g.innerHTML = "<p style='text-align:center'>Nessuna foto</p>";
return;
}

let photos = [];
snapshot.forEach(doc=>{
photos.push({id:doc.id,...doc.data()});
});

photos.sort((a,b)=>b.time-a.time);

g.innerHTML = `
<div class="gallery-grid">
${photos.map(p=>`
<div class="photo-card">
<img src="${p.url}" onclick="openImg('${p.url}')">
${isAdmin ? `<button class="delete-btn" onclick="deletePhoto('${p.id}')">🗑</button>` : ""}
</div>
`).join("")}
</div>`;
});
}

function deletePhoto(id){
if(!isAdmin) return;
if(confirm("Eliminare foto?")){
db.collection("photos").doc(id).delete().then(render);
}
}

function uploadPhoto(){
let scelta = document.getElementById("folderSelect").value;

let widget = cloudinary.createUploadWidget({
cloudName:"dagfasmlx",
uploadPreset:"iv-memorial",
folder:"iv-memorial/"+scelta
}, (err,res)=>{

if(res && res.event==="success"){
db.collection("photos").add({
url:res.info.secure_url,
tag:scelta,
time:Date.now()
});
render();
}
});

widget.open();
}

function openImg(url){
const m = document.createElement("div");
m.style="position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center";
m.innerHTML=`<img src="${url}" style="max-width:90%;max-height:90%">`;
m.onclick=()=>m.remove();
document.body.appendChild(m);
}

render();

</script>

</body>
</html>
