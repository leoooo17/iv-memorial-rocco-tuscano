<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
color:#1b1b1b;
}

/* =========================
   HERO
========================= */
header{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg")
center/cover no-repeat;
overflow:hidden;
}

header::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
180deg,
rgba(0,40,90,0.65),
rgba(0,0,0,0.55)
);
}

.hero-text{
position:relative;
z-index:2;
padding:20px;
animation: fadeUp 0.9s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(18px);}
to{opacity:1; transform:translateY(0);}
}

.hero-badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
font-size:12px;
letter-spacing:2px;
font-weight:700;
color:#0b3d91;
background:rgba(255,255,255,0.9);
margin-bottom:14px;
}

/* TITLE */
.hero-text h1{
font-size:68px;
color:#FFD700;
margin:0;
letter-spacing:3px;
text-transform:uppercase;
text-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.hero-text h1::after{
content:"";
display:block;
width:120px;
height:3px;
background:#FFD700;
margin:14px auto 0;
border-radius:10px;
transition:0.3s;
}

.hero-text h1:hover::after{
width:160px;
}

/* SUBTITLE */
.hero-subtitle{
color:rgba(255,255,255,0.92);
max-width:780px;
margin:18px auto 0;
line-height:1.6;
font-size:18px;
}

/* =========================
   SEZIONE GALLERY (RIVISITATA)
========================= */
.gallery-section {
padding: 60px 20px;
max-width: 1200px;
margin: 0 auto;
}

.gallery-title{
text-align:center;
font-size:28px;
font-weight:800;
letter-spacing:4px;
margin-bottom:30px;
color:#0b3d91;
text-transform: uppercase;
position:relative;
}

.gallery-title::after{
content:"";
display:block;
width:50px;
height:4px;
background:#FFD700; /* Richiamo oro dell'header */
margin:10px auto 0;
border-radius:10px;
transition:0.3s ease;
}

.gallery-title:hover::after{
width:90px;
}

/* MENU FILTRI */
.menu{
position:sticky;
top:15px;
background:rgba(255, 255, 255, 0.85);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
z-index:999;
padding:10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
border-radius: 999px;
box-shadow:0 10px 30px rgba(11,61,145,0.08);
border:1px solid rgba(11,61,145,0.1);
margin-bottom: 40px;
}

.menu button{
padding:10px 22px;
border-radius:999px;
border:2px solid #0b3d91;
background:transparent;
color:#0b3d91;
cursor:pointer;
font-weight:700;
font-size:13px;
letter-spacing: 1px;
transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.menu button:hover{
background:#0b3d91;
color:#FFD700;
transform:translateY(-2px);
box-shadow: 0 4px 12px rgba(11,61,145,0.2);
}

.menu button.active{
background:#0b3d91;
color:#FFD700;
border-color:#0b3d91;
box-shadow: 0 4px 15px rgba(11,61,145,0.3);
}

/* GRID & CARD FOTO */
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
gap:25px;
}

.photo-card{
background:#ffffff;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
position:relative;
border:1px solid rgba(0,0,0,0.04);
aspect-ratio: 4/3;
}

.photo-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(11,61,145,0.15);
}

.photo-card img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
transition:transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.photo-card:hover img{
transform:scale(1.05);
}

/* DELETE BUTTON */
.delete-btn{
position:absolute;
top:12px;
right:12px;
padding:8px 10px;
font-size:14px;
border:none;
border-radius:50%;
background:rgba(231,76,60,0.9);
color:white;
cursor:pointer;
transition:0.2s ease;
box-shadow: 0 4px 10px rgba(0,0,0,0.2);
display: flex;
align-items: center;
justify-content: center;
}

.delete-btn:hover{
transform:scale(1.1);
background:rgb(231,76,60);
}

/* Animazione ingresso foto */
.photo-card{
animation:fadeChamp 0.5s ease backwards;
}

@keyframes fadeChamp{
from{ opacity:0; transform:translateY(20px); }
to{ opacity:1; transform:translateY(0); }
}
   
/* PANNELLO LOGIN ADM */
#menuBtn{
position:fixed;
top:15px;
left:15px;
z-index:2000;
padding:10px 16px;
background:#0b3d91;
color:white;
border:none;
border-radius:30px;
font-weight: bold;
cursor:pointer;
box-shadow: 0 4px 15px rgba(0,0,0,0.2);
transition: 0.2s;
}
#menuBtn:hover{ transform: scale(1.05); background:#082d6b; }

#loginBox{
position:fixed;
top:65px;
left:15px;
z-index:2000;
background:white;
padding:12px;
border-radius:14px;
display:none;
width:180px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
border: 1px solid rgba(11,61,145,0.1);
}

#loginBox input{
width:100%;
padding:8px;
font-size:13px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:8px;
box-sizing:border-box;
}

#loginBox button{
width:100%;
padding:8px;
font-size:13px;
border-radius:8px;
background: #0b3d91;
color: white;
border: none;
font-weight: bold;
cursor: pointer;
}

#folderSelect{
width:100%;
font-size:13px;
padding:8px;
box-sizing:border-box;
border-radius:8px;
margin-bottom:8px;
border: 1px solid #ddd;
}

/* OVERLAY VISUALIZZAZIONE FOTO */
.img-overlay{
position:fixed;
inset:0;
background:rgba(11, 40, 90, 0.95); /* Tonalità blu scuro invece di nero assoluto */
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
cursor:zoom-out;
animation: fadeIn 0.3s ease;
}

.img-overlay img{
max-width:90%;
max-height:90vh;
border-radius:12px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
animation: fadeUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

@keyframes fadeIn {
from { opacity: 0; } to { opacity: 1; }
}

/* PH BUTTON */
.ig-fotografo{
position:fixed;
top:15px;
right:15px;
z-index:3000;
background:rgba(255,255,255,0.9);
color:#0b3d91;
padding:10px 18px;
border-radius:999px;
text-decoration:none;
font-size:13px;
font-weight:700;
box-shadow: 0 4px 15px rgba(0,0,0,0.15);
transition: 0.3s ease;
border: 1px solid rgba(11,61,145,0.1);
}

.ig-fotografo:hover{
background:#0b3d91;
color:#FFD700;
transform: translateY(-2px);
}

/* RESPONSIVE */
@media (max-width: 900px){
.hero-text h1{font-size:48px;}
.menu { border-radius: 20px; top: 10px; margin-bottom: 25px; }
}

@media (max-width: 600px) {
.hero-text h1{font-size:38px;}
.hero-subtitle{font-size:16px;}
.gallery-section { padding: 40px 15px; }
.menu button { padding: 8px 14px; font-size: 12px; }
}

</style>
</head>

<body>

target="_blank">
📸 PH Alessio Orlando
</a>

<button id="menuBtn" onclick="toggleLogin()">☰ Menu</button>

<div id="loginBox">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>

<div id="uploadBox" style="display:none;margin-top:6px;">

        <button onclick="setFolder('semifinale')">SEMIFINALI</button>

<script>

};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFolder = "gironi";
let isAdmin = false;

// Avvia il primo render automatico al caricamento della pagina
window.onload = () => { render(); };

function toggleLogin(){
document.getElementById("loginBox").style.display =
document.getElementById("loginBox").style.display === "block"
? "none" : "block";
}

function login(){
const pass=document.getElementById("pass").value;
if(pass==="alessio2026"){
isAdmin=true;
document.getElementById("uploadBox").style.display="block";
render();
}
}

document.getElementById("pass").addEventListener("keydown", function(e){
if(e.key==="Enter") login();
});

function setFolder(f){
currentFolder=f;

document.querySelectorAll(".menu button").forEach(b=>{
b.classList.remove("active");

if(b.textContent.toLowerCase().includes(f.toLowerCase())){
b.classList.add("active");
}
});

render();
}

function render(){
const g=document.getElementById("gallery");
g.innerHTML="";

db.collection("photos").where("tag","==",currentFolder).get()
.then(snapshot=>{

if(snapshot.empty){
g.innerHTML="<p style='text-align:center; color:#0b3d91; font-weight:bold; margin-top:40px;'>Nessuna foto presente in questa categoria.</p>";
return;
}

let photos=[];
snapshot.forEach(doc=>{
photos.push({id:doc.id,...doc.data()});
});

photos.sort((a,b)=>b.time-a.time);

g.innerHTML=`
<div class="gallery-grid">
${photos.map((p, index)=>`
<div class="photo-card" style="animation-delay: ${index * 0.05}s">
<img src="${p.url}" onclick="openImg('${p.url}')" alt="Foto Torneo">
${isAdmin?`<button class="delete-btn" onclick="deletePhoto('${p.id}')">🗑</button>`:""}
</div>
`).join("")}
</div>`;
});
}

function openImg(url){
const overlay=document.createElement("div");
overlay.className="img-overlay";
overlay.innerHTML=`<img src="${url}">`;
overlay.onclick=()=>{
  overlay.remove();
  document.body.style.overflow="auto";
};
document.body.appendChild(overlay);
document.body.style.overflow="hidden";
}

if(!isAdmin)return;
if(confirm("Sei sicuro di voler eliminare questa foto?")) {
