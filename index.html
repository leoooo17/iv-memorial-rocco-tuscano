<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Memorial Rocco Tuscano</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f6f8;
}

header{
    position:relative;
    height:220px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    background:url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d") center/cover no-repeat;
}

header::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

header h1, header p{
    position:relative;
}

.menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    padding:10px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#1f1f1f;
    color:white;
    font-size:13px;
}

button:hover{
    background:#007bff;
}

.upload{
    text-align:center;
    padding:15px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>IV Memorial Rocco Tuscano</h1>
<p>Galleria ufficiale torneo</p>
</header>

<div class="upload">

<button onclick="showLogin()">🔒 Area Fotografo</button>

<div id="loginBox" style="display:none; margin-top:10px;">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Accedi</button>
</div>

<div id="uploadBox" style="display:none; margin-top:10px;">
    <button onclick="uploadPhoto()">📸 Carica Foto</button>
</div>

</div>

<div class="menu">

<button onclick="filter('08-06')">08/06</button>
<button onclick="filter('09-06')">09/06</button>
<button onclick="filter('10-06')">10/06</button>
<button onclick="filter('11-06')">11/06</button>
<button onclick="filter('12-06')">12/06</button>
<button onclick="filter('13-06')">13/06</button>
<button onclick="filter('15-06')">15/06</button>
<button onclick="filter('16-06')">16/06</button>
<button onclick="filter('17-06')">17/06</button>

<button onclick="filter('ottavi')">OTTAVI</button>
<button onclick="filter('quarti')">QUARTI</button>
<button onclick="filter('semifinale')">SEMIFINALE</button>
<button onclick="filter('finale')">FINALE</button>

</div>

<section class="gallery" id="gallery"></section>

<script>

const cloudName = "dagfasmlx";
const uploadPreset = "iv-memorial";

let isAdmin = false;
let currentTag = "08-06";

/* LOGIN */
function showLogin(){
    document.getElementById("loginBox").style.display = "block";
}

function login(){
    const pass = document.getElementById("pass").value;

    if(pass === "alessio2026"){
        isAdmin = true;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("uploadBox").style.display = "block";
        alert("Accesso OK");
    } else {
        alert("Password errata");
    }
}

/* FILTRO */
function filter(tag){
    currentTag = tag;
    loadImages(tag);
}

/* UPLOAD */
function uploadPhoto(){

    if(!isAdmin){
        alert("Devi fare login");
        return;
    }

    let widget = cloudinary.createUploadWidget({
        cloudName: cloudName,
        uploadPreset: uploadPreset,
        sources: ['local','camera'],
        multiple: true,
        tags: [currentTag]   // 🔥 QUI SALVIAMO LA CATEGORIA
    },
    (error, result) => {

        if(!error && result && result.event === "success"){
            loadImages(currentTag);
        }

        // 🔥 DOPO UPLOAD CHIEDE TAG (B)
        if(result && result.event === "success"){
            const scelta = prompt(
`Dove vuoi inserire la foto?

08-06, 09-06, 10-06, 11-06, 12-06, 13-06,
15-06, 16-06, 17-06, ottavi, quarti, semifinale, finale`
            );

            if(scelta){
                result.info.tags = [scelta];
            }
        }
    });

    widget.open();
}

/* ZOOM */
function openImg(url){
    const m = document.createElement("div");
    m.style = "position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center";
    m.innerHTML = `<img src='${url}' style='max-width:90%;max-height:90%'>`;
    m.onclick = () => m.remove();
    document.body.appendChild(m);
}

/* CARICA FOTO (TAG BASED) */
function loadImages(tag){

    const url = `https://res.cloudinary.com/${cloudName}/image/upload/fl_getall,tags:${tag}`;

    fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`)
    .then(r => r.json())
    .then(data => {

        const g = document.getElementById("gallery");
        g.innerHTML = "";

        if(!data.resources){
            g.innerHTML = "<p style='text-align:center'>Nessuna foto</p>";
            return;
        }

        data.resources.forEach(img => {

            const imgUrl = `https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.${img.format}`;

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${imgUrl}" onclick="openImg('${imgUrl}')">
                <a href="${imgUrl}" download>Scarica</a>
            `;

            g.appendChild(div);
        });
    });
}

/* INIT */
loadImages(currentTag);

</script>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

</body>
</html>
