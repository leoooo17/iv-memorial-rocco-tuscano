<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

/* HEADER */
header{
height:70vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:url("https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg")
center/cover no-repeat;
position:relative;
}

header::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

header h1{
position:relative;
font-size:50px;
z-index:2;
}

header p{
position:relative;
z-index:2;
max-width:700px;
margin:10px auto;
color:rgba(255,255,255,0.85);
}

/* MENU */
.menu{
position:sticky;
top:0;
background:#111;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
padding:10px;
z-index:999;
border-bottom:1px solid #333;
}

.menu button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:#222;
color:white;
transition:0.2s;
}

.menu button:hover{
background:#FFD700;
color:black;
transform:translateY(-2px);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:15px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.gallery img:hover{
transform:scale(1.03);
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

</style>
</head>

<body>

<header>
  <div>
    <h1>IV MEMORIAL ROCCO TUSCANO</h1>
    <p>
      Galleria ufficiale del torneo. Tutte le foto sono caricate su Google Foto dal fotografo.
    </p>
  </div>
</header>

<!-- MENU CARTELLE -->
<div class="menu">
<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>
<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>

/* 🔥 QUI METTI I LINK GOOGLE FOTO (PER CARTELLA) */
const albums = {
  "08-06": [
    "https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg"
  ],

  "09-06": [
    "https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg"
  ],

  "10-06": [
    "https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg"
  ],

  "ottavi": [
    "https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg"
  ],

  "quarti": [
    "https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg"
  ],

  "finale": [
    "https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg"
  ]
};

let currentFolder = "08-06";

function setFolder(folder){
  currentFolder = folder;
  render();
}

function render(){
  const g = document.getElementById("gallery");
  g.innerHTML = "";

  const images = albums[currentFolder] || [];

  if(images.length === 0){
    g.innerHTML = "<p style='text-align:center'>Nessuna foto disponibile</p>";
    return;
  }

  images.forEach(url=>{
    const img = document.createElement("img");
    img.src = url;
    img.onclick = ()=>openModal(url);
    g.appendChild(img);
  });
}

function openModal(url){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=url;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

render();

</script>

</body>
</html>
