<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f10;
color:white;
}

/* HEADER HERO */
header{
height:260px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://images.unsplash.com/photo-1508098682722-e99c43a406b2") center/cover no-repeat;
}

header::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

header h1{
position:relative;
font-size:32px;
letter-spacing:2px;
text-transform:uppercase;
}

/* AREA CONTROLLI */
.upload{
text-align:center;
padding:15px;
}

button{
padding:10px 16px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#1f1f1f,#3a3a3a);
color:white;
cursor:pointer;
margin:6px;
transition:0.2s;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
background:linear-gradient(135deg,#ff3b3b,#ff7a00);
}

/* MENU CARTELLE */
.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
gap:6px;
}

.menu button{
font-size:13px;
}

/* GALLERIA */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:15px;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
display:block;
}

/* LOGIN BOX */
#loginBox input{
padding:10px;
border-radius:20px;
border:none;
outline:none;
margin-right:5px;
}
</style>
</head>

<body>

<header>
<h1>IV MEMORIAL<br>ROCCO TUSCANO</h1>
</header>

<!-- QUI NON TOCCHIAMO LOGICA JS -->
<div class="upload">

<button onclick="showLogin()">🔒 Area Fotografo</button>

<div id="loginBox" style="display:none;">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>
</div>

<div id="uploadBox" style="display:none;">
<button onclick="uploadPhoto()">📸 Carica Foto</button>
</div>

</div>

<div class="menu">

<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>

<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>

</div>

<div class="gallery" id="gallery"></div>

<script>
/* ⚠️ NON TOCCARE QUI PER ORA */
</script>

</body>
</html>
