<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6f8;
}

header{
height:200px;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d") center/cover;
position:relative;
}

header::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

header h1{
position:relative;
}

button{
padding:10px 14px;
border:none;
border-radius:20px;
background:#222;
color:white;
cursor:pointer;
margin:5px;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
}

.upload{
text-align:center;
padding:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>IV Memorial Rocco Tuscano</h1>
</header>

<div class="upload">

<button onclick="showLogin()">🔒 Area Fotografo</button>

<div id="loginBox" style="display:none;">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>
</div>

<div id="uploadBox" style="display:none;">
<button onclick="uploadPhoto()">📸 Carica Foto</button>
</div>

</div>

<div class="menu">

<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>

<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>

</div>

<div class="gallery" id="gallery"></div>

<script>

let currentFolder = "08-06";
let isAdmin = false;

/* DATABASE LOCALE */
let photos = JSON.parse(localStorage.getItem("photos")) || [];

/* LOGIN */
function showLogin(){
document.getElementById("loginBox").style.display = "block";
}

function login(){
const pass = document.getElementById("pass").value;

if(pass === "alessio2026"){
isAdmin = true;

document.getElementById("uploadBox").style.display = "block";
document.getElementById("loginBox").style.display = "none";

alert("Accesso fotografo effettuato");

// 🔥 aggiorna UI
render();

}else{
alert("Password errata");
}
}

/* CAMBIA CARTELLA */
function setFolder(folder){
currentFolder = folder;
render();
}

/* UPLOAD FOTO */
function uploadPhoto(){

if(!isAdmin){
alert("Devi fare login");
return;
}

let scelta = prompt(
`Scegli cartella:

08-06, 09-06, 10-06, 11-06, 12-06, 13-06,
15-06, 16-06, 17-06, ottavi, quarti, semifinale, finale`
);

if(!scelta){
alert("Devi scegliere una cartella");
return;
}

let widget = cloudinary.createUploadWidget({
cloudName: "dagfasmlx",
uploadPreset: "iv-memorial",
folder: "iv-memorial/" + scelta
}, (err,res)=>{

if(res && res.event === "success"){

photos.push({
url: res.info.secure_url,
tag: scelta
});

localStorage.setItem("photos", JSON.stringify(photos));
render();
}
});

widget.open();
}

/* RENDER GALLERIA */
function render(){

const g = document.getElementById("gallery");
g.innerHTML = "";

const filtered = photos.filter(p => p.tag === currentFolder);

if(filtered.length === 0){
g.innerHTML = "<p style='text-align:center'>Nessuna foto in questa sezione</p>";
return;
}

filtered.forEach((p, index)=>{

g.innerHTML += `
<div class="card">

<img src="${p.url}" onclick="openImg('${p.url}')">

${isAdmin ? `
<button onclick="deletePhoto(${index})"
style="width:100%;background:red;border-radius:0;">
🗑 Elimina
</button>
` : ""}

</div>
`;
});
}

/* ELIMINA FOTO */
function deletePhoto(index){

if(!confirm("Vuoi eliminare questa foto?")) return;

let filtered = photos.filter(p => p.tag === currentFolder);

filtered.splice(index, 1);

photos = [
...photos.filter(p => p.tag !== currentFolder),
...filtered
];

localStorage.setItem("photos", JSON.stringify(photos));

render();
}

/* ZOOM FOTO */
function openImg(url){
const m = document.createElement("div");
m.style = "position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center";
m.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%">`;
m.onclick = ()=>m.remove();
document.body.appendChild(m);
}

/* INIT */
render();

</script>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

</body>
</html>
