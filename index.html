<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f6;
color:#222;
}

/* HEADER */
header{
height:260px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d") center/cover no-repeat;
}

header::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

header h1{
position:relative;
font-size:36px;
letter-spacing:2px;
text-transform:uppercase;
color:#FFD700;
}

/* BOTTONI */
button{
padding:10px 14px;
border-radius:12px;
border:1px solid #ddd;
background:white;
color:#222;
cursor:pointer;
margin:4px;
font-weight:600;
transition:0.2s;
}

button:hover{
background:#FFD700;
transform:translateY(-2px);
}

/* MENU BUTTON */
#menuBtn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:1000;

padding:14px 22px;
border:none;
border-radius:14px;
background:#111;
color:white;
font-size:20px;
cursor:pointer;
}

/* CONTENT INITIALLY HIDDEN */
#content{
display:none;
}

/* MENU CARTELLE */
.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
gap:6px;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
padding:15px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:0.2s;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
}

.card:hover{
transform:scale(1.02);
}
</style>
</head>

<body>

<!-- 🔥 MENU INIT -->
<button id="menuBtn" onclick="openSite()">☰ MENU</button>

<!-- 🔥 CONTENUTO NASCOSTO -->
<div id="content">

<header>
<h1>IV MEMORIAL ROCCO TUSCANO</h1>
</header>

<div class="menu">

<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>

<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>

</div>

<div class="gallery" id="gallery"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- CLOUDINARY -->
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBdcApiH4G4kuSUKxIxQhhmq_fiLNRerp8",
  authDomain: "memorial-rocco-tuscano.firebaseapp.com",
  projectId: "memorial-rocco-tuscano",
  storageBucket: "memorial-rocco-tuscano.firebasestorage.app",
  messagingSenderId: "72206140774",
  appId: "1:72206140774:web:ac817e3fcd7107e53e34a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFolder = "08-06";

/* 🔥 APERTURA SITO */
function openSite(){
document.getElementById("menuBtn").style.display = "none";
document.getElementById("content").style.display = "block";
render();
}

/* CARTELLE */
function setFolder(f){
currentFolder = f;
render();
}

/* GALLERY */
function render(){

const g = document.getElementById("gallery");
g.innerHTML = "";

db.collection("photos")
.where("tag","==",currentFolder)
.get()
.then(snapshot=>{

if(snapshot.empty){
g.innerHTML = "<p style='text-align:center'>Nessuna foto</p>";
return;
}

snapshot.forEach(doc=>{
let data = doc.data();

g.innerHTML += `
<div class="card">
<img src="${data.url}" onclick="openImg('${data.url}')">
</div>
`;
});
});
}

/* ZOOM */
function openImg(url){
const m = document.createElement("div");
m.style = "position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center";
m.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%">`;
m.onclick = ()=>m.remove();
document.body.appendChild(m);
}

</script>

</body>
</html>
