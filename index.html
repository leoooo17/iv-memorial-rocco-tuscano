<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f6;
color:#222;
}

/* HEADER */
header{
height:260px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d") center/cover no-repeat;
}

header::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

header h1{
position:relative;
font-size:36px;
letter-spacing:2px;
text-transform:uppercase;
color:#FFD700;
}

/* MENU BUTTON */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:1000;

padding:10px 14px;
border-radius:10px;
border:none;
background:#111;
color:white;
cursor:pointer;
font-weight:600;
}

#menuBtn:hover{
background:#FFD700;
color:#111;
}

/* SIDEBAR FOTOGRAFO */
#photographerPanel{
position:fixed;
top:0;
left:-320px;
width:300px;
height:100%;
background:#111;
color:white;
padding:16px;
transition:0.3s;
z-index:999;
box-sizing:border-box;
}

#photographerPanel.open{
left:0;
}

#photographerPanel h3{
color:#FFD700;
margin-top:0;
font-size:18px;
margin-bottom:10px;
}

/* INPUT COMPATTI */
#photographerPanel input,
#photographerPanel select{
width:100%;
padding:8px;
margin-top:8px;
border:none;
border-radius:8px;
font-size:14px;
box-sizing:border-box;
}

#photographerPanel input{
height:34px;
}

/* BOTTONI COMPATTI */
#photographerPanel button{
width:100%;
margin-top:8px;
padding:9px;
font-size:14px;
border-radius:8px;
}

/* CARTELLE */
.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
gap:6px;
}

button{
padding:10px 14px;
border-radius:12px;
border:1px solid #ddd;
background:white;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
background:#FFD700;
transform:translateY(-2px);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
padding:15px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:0.2s;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
}

.card:hover{
transform:scale(1.02);
}
</style>
</head>

<body>

<!-- 🔥 MENU BUTTON -->
<button id="menuBtn" onclick="openPhotographer()">☰ Menu</button>

<!-- 🔥 SIDEBAR FOTOGRAFO -->
<div id="photographerPanel">

<h3>Area Fotografo</h3>

<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>

<div id="uploadBox" style="display:none;">

<select id="folderSelect">
<option value="08-06">08/06</option>
<option value="09-06">09/06</option>
<option value="10-06">10/06</option>
<option value="11-06">11/06</option>
<option value="12-06">12/06</option>
<option value="13-06">13/06</option>
<option value="15-06">15/06</option>
<option value="16-06">16/06</option>
<option value="17-06">17/06</option>
<option value="ottavi">OTTAVI</option>
<option value="quarti">QUARTI</option>
<option value="semifinale">SEMIFINALE</option>
<option value="finale">FINALE</option>
</select>

<button onclick="uploadPhoto()">📸 Carica Foto</button>

</div>

</div>

<!-- HEADER -->
<header>
<h1>IV MEMORIAL ROCCO TUSCANO</h1>
</header>

<!-- CARTELLE -->
<div class="menu">

<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>

<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>

</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- CLOUDINARY -->
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBdcApiH4G4kuSUKxIxQhhmq_fiLNRerp8",
  authDomain: "memorial-rocco-tuscano.firebaseapp.com",
  projectId: "memorial-rocco-tuscano",
  storageBucket: "memorial-rocco-tuscano.firebasestorage.app",
  messagingSenderId: "72206140774",
  appId: "1:72206140774:web:ac817e3fcd7107e53e34a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFolder = "08-06";
let isAdmin = false;

/* PANEL FOTOGRAFO */
function openPhotographer(){
document.getElementById("photographerPanel").classList.add("open");
document.getElementById("menuBtn").style.display = "none";
}

/* LOGIN */
function login(){
const pass = document.getElementById("pass").value;

if(pass === "alessio2026"){
isAdmin = true;
document.getElementById("uploadBox").style.display = "block";
alert("Accesso fotografo attivato");
}else{
alert("Password errata");
}
}

/* CARTELLE */
function setFolder(f){
currentFolder = f;
render();
}

/* UPLOAD */
function uploadPhoto(){

if(!isAdmin){
alert("Devi fare login");
return;
}

let scelta = document.getElementById("folderSelect").value;

let widget = cloudinary.createUploadWidget({
cloudName: "dagfasmlx",
uploadPreset: "iv-memorial",
folder: "iv-memorial/" + scelta
}, (err,res)=>{

if(res && res.event === "success"){

db.collection("photos").add({
url: res.info.secure_url,
tag: scelta,
time: Date.now()
});

render();
}
});

widget.open();
}

/* GALLERY */
function render(){
const g = document.getElementById("gallery");
g.innerHTML = "";

db.collection("photos")
.where("tag","==",currentFolder)
.get()
.then(snapshot=>{

if(snapshot.empty){
g.innerHTML = "<p style='text-align:center'>Nessuna foto</p>";
return;
}

snapshot.forEach(doc=>{
let data = doc.data();

g.innerHTML += `
<div class="card">
<img src="${data.url}" onclick="openImg('${data.url}')">
</div>
`;
});
});
}

/* ZOOM */
function openImg(url){
const m = document.createElement("div");
m.style = "position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center";
m.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%">`;
m.onclick = ()=>m.remove();
document.body.appendChild(m);
}

render();

</script>

</body>
</html>
