<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6f8;
}

header{
height:200px;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d") center/cover;
position:relative;
}

header::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

header h1{
position:relative;
text-align:center;
}

button{
padding:10px 14px;
border:none;
border-radius:20px;
background:#222;
color:white;
cursor:pointer;
margin:5px;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
}

.upload{
text-align:center;
padding:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
}

#loginBox input{
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h1>IV MEMORIAL ROCCO TUSCANO</h1>
</header>

<div class="upload">

<button onclick="showLogin()">🔒 Area Fotografo</button>

<div id="loginBox" style="display:none;">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>
</div>

<div id="uploadBox" style="display:none;">
<button onclick="uploadPhoto()">📸 Carica Foto</button>
</div>

</div>

<div class="menu">

<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>

<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>

</div>

<div class="gallery" id="gallery"></div>

<!-- FIREBASE + CLOUDINARY -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBdcApiH4G4kuSUKxIxQhhmq_fiLNRerp8",
  authDomain: "memorial-rocco-tuscano.firebaseapp.com",
  projectId: "memorial-rocco-tuscano",
  storageBucket: "memorial-rocco-tuscano.firebasestorage.app",
  messagingSenderId: "72206140774",
  appId: "1:72206140774:web:ac817e3fcd7107e53e34a7",
  measurementId: "G-L5K6JSWZ5W"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* VARIABILI */
let isAdmin = false;
let currentFolder = "08-06";

/* LOGIN */
function showLogin(){
document.getElementById("loginBox").style.display = "block";
}

function login(){
const pass = document.getElementById("pass").value;

if(pass === "alessio2026"){
isAdmin = true;
document.getElementById("uploadBox").style.display = "block";
document.getElementById("loginBox").style.display = "none";
alert("Accesso fotografo effettuato");
render();
}else{
alert("Password errata");
}
}

/* CAMBIA CARTELLA */
function setFolder(f){
currentFolder = f;
render();
}

/* UPLOAD FOTO */
function uploadPhoto(){

if(!isAdmin){
alert("Devi fare login");
return;
}

let scelta = prompt("Scegli cartella (es: 08-06, ottavi, quarti...)");

if(!scelta) return;

let widget = cloudinary.createUploadWidget({
cloudName: "dagfasmlx",
uploadPreset: "iv-memorial",
folder: "iv-memorial/" + scelta
}, (err,res)=>{

if(res && res.event === "success"){

db.collection("photos").add({
url: res.info.secure_url,
tag: scelta,
time: Date.now()
});

render();
}
});

widget.open();
}

/* ELIMINA FOTO */
function deletePhoto(id){
if(!confirm("Vuoi eliminare questa foto?")) return;

db.collection("photos").doc(id).delete().then(render);
}

/* RENDER GALLERIA */
function render(){

const g = document.getElementById("gallery");
g.innerHTML = "";

db.collection("photos")
.where("tag","==",currentFolder)
.get()
.then(snapshot=>{

if(snapshot.empty){
g.innerHTML = "<p style='text-align:center'>Nessuna foto in questa sezione</p>";
return;
}

snapshot.forEach(doc=>{

let data = doc.data();

g.innerHTML += `
<div class="card">

<img src="${data.url}" onclick="openImg('${data.url}')">

${isAdmin ? `
<button onclick="deletePhoto('${doc.id}')"
style="width:100%;background:red;border-radius:0;">
🗑 Elimina
</button>
` : ""}

</div>
`;
});

});
}

/* ZOOM */
function openImg(url){
const m = document.createElement("div");
m.style = "position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center";
m.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%">`;
m.onclick = ()=>m.remove();
document.body.appendChild(m);
}

/* INIT */
render();

</script>

</body>
</html>
