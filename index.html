<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
color:#1b1b1b;
}

/* =========================
   HERO
========================= */
header{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg")
center/cover no-repeat;
overflow:hidden;
}

header::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
180deg,
rgba(0,40,90,0.65),
rgba(0,0,0,0.55)
);
}

.hero-text{
position:relative;
z-index:2;
padding:20px;
animation: fadeUp 0.9s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(18px);}
to{opacity:1; transform:translateY(0);}
}

.hero-badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
font-size:12px;
letter-spacing:2px;
font-weight:700;
color:#0b3d91;
background:rgba(255,255,255,0.9);
margin-bottom:14px;
}

.hero-text h1{
font-size:68px;
color:#FFD700;
margin:0;
letter-spacing:3px;
text-transform:uppercase;
text-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.hero-text h1::after{
content:"";
display:block;
width:120px;
height:3px;
background:#FFD700;
margin:14px auto 0;
border-radius:10px;
transition:0.3s;
}

.hero-text h1:hover::after{
width:160px;
}

.hero-subtitle{
color:rgba(255,255,255,0.92);
max-width:780px;
margin:18px auto 0;
line-height:1.6;
font-size:18px;
}

/* =========================
   CHAMPIONS GALLERY STYLE
========================= */

.gallery-title{
text-align:center;
font-size:22px;
font-weight:800;
letter-spacing:3px;
margin:25px 0 10px;
color:#0b3d91;
position:relative;
}

.gallery-title::after{
content:"";
display:block;
width:60px;
height:3px;
background:#0b3d91;
margin:8px auto 0;
border-radius:10px;
transition:.3s;
}

.gallery-title:hover::after{
width:120px;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(190px, 1fr));
gap:16px;
padding:25px;
max-width:1200px;
margin:auto;
}

.photo-card{
background:linear-gradient(145deg,#ffffff,#f3f6ff);
border-radius:18px;
overflow:hidden;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.12);
transition:.35s ease;
border:1px solid rgba(11,61,145,.08);
animation:fadeIn .4s ease;
}

.photo-card:hover{
transform:translateY(-8px);
box-shadow:0 20px 50px rgba(0,0,0,.18);
}

.photo-card img{
width:100%;
height:240px;
object-fit:cover;
cursor:pointer;
transition:.5s ease;
filter:contrast(1.05) saturate(1.05);
}

.photo-card:hover img{
transform:scale(1.08);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.delete-btn{
position:absolute;
top:10px;
right:10px;
padding:6px 8px;
font-size:12px;
border:none;
border-radius:8px;
background:rgba(231,76,60,.95);
color:white;
cursor:pointer;
transition:.2s;
}

.delete-btn:hover{
transform:scale(1.1);
}

/* =========================
   MENU
========================= */
.menu{
position:sticky;
top:0;
background:rgba(255,255,255,0.92);
backdrop-filter: blur(14px);
z-index:999;
padding:14px 10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
border-bottom:1px solid rgba(0,90,180,0.12);
}

button{
padding:9px 16px;
border-radius:999px;
border:2px solid #0b3d91;
background:white;
color:#0b3d91;
cursor:pointer;
font-weight:700;
font-size:13px;
transition:0.25s ease;
}

button:hover{
background:#0b3d91;
color:#FFD700;
transform:translateY(-2px) scale(1.06);
}

button.active{
background:#FFD700;
color:#0b3d91;
border-color:#FFD700;
}

/* =========================
   GALLERIA FALLBACK
========================= */
#gallery{
padding-bottom:40px;
}

/* =========================
   LOGIN
========================= */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:2000;
padding:10px 14px;
background:#0b3d91;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#loginBox{
position:fixed;
top:55px;
left:10px;
z-index:2000;
background:white;
padding:8px;
border-radius:10px;
display:none;
width:140px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

#loginBox input{
width:100%;
padding:5px;
font-size:12px;
border:1px solid #ddd;
border-radius:6px;
margin-bottom:6px;
box-sizing:border-box;
}

#loginBox button{
width:100%;
padding:6px;
font-size:12px;
border-radius:6px;
}

/* OVERLAY */
.img-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
cursor:pointer;
}

.img-overlay img{
max-width:95%;
max-height:95%;
border-radius:8px;
}

/* RESPONSIVE */
@media (max-width: 900px){
.hero-text h1{font-size:40px;}
}

@media (max-width: 600px){
.hero-text h1{font-size:50px;}
.hero-subtitle{font-size:17px;}
}

@media (max-width: 400px){
.hero-text h1{font-size:35px;}
}

</style>
</head>

<body>

<button id="menuBtn" onclick="toggleLogin()">☰ Menu</button>

<div id="loginBox">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>

<div id="uploadBox" style="display:none;margin-top:6px;">
<select id="folderSelect">
<option value="gironi">GIRONI</option>
<option value="ottavi">OTTAVI</option>
<option value="quarti">QUARTI</option>
<option value="semifinale">SEMIFINALI</option>
<option value="finale">FINALE</option>
</select>
<button onclick="uploadPhoto()">📸 Carica</button>
</div>
</div>

<header>
  <div class="hero-text">
    <div class="hero-badge">TORNEO UFFICIALE • EDIZIONE 2026</div>
    <h1>IV MEMORIAL<br>ROCCO TUSCANO</h1>
    <p class="hero-subtitle">Sport, emozione e ricordo.</p>
  </div>
</header>

<div class="gallery-title">GALLERY</div>

<div class="menu">
<button onclick="setFolder('gironi')">GIRONI</button>
<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALI</button>
<button onclick="setFolder('finale')">FINALE</button>
</div>

<div id="gallery"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBdcApiH4G4kuSUKxIxQhhmq_fiLNRerp8",
authDomain: "memorial-rocco-tuscano.firebaseapp.com",
projectId: "memorial-rocco-tuscano",
storageBucket: "memorial-rocco-tuscano.firebasestorage.app",
messagingSenderId: "72206140774",
appId: "1:72206140774:web:ac817e3fcd7107e53e34a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFolder="gironi";
let isAdmin=false;

/* LOGIN */
function toggleLogin(){
document.getElementById("loginBox").style.display =
document.getElementById("loginBox").style.display==="block"?"none":"block";
}

function login(){
if(document.getElementById("pass").value==="alessio2026"){
isAdmin=true;
document.getElementById("uploadBox").style.display="block";
render();
}
}

/* FOLDER */
function setFolder(f){
currentFolder=f;
document.querySelectorAll(".menu button").forEach(b=>{
b.classList.remove("active");
if(b.textContent.toLowerCase().includes(f)) b.classList.add("active");
});
render();
}

/* RENDER */
function render(){
const g=document.getElementById("gallery");
g.innerHTML="";

db.collection("photos")
.where("tag","==",currentFolder)
.get()
.then(snapshot=>{

if(snapshot.empty){
g.innerHTML="<p style='text-align:center'>Nessuna foto</p>";
return;
}

let photos=[];
snapshot.forEach(doc=>{
photos.push({id:doc.id,...doc.data()});
});

photos.sort((a,b)=>b.time-a.time);

g.innerHTML=`<div class="gallery-grid">
${photos.map(p=>`
<div class="photo-card">
<img src="${p.url}" onclick="openImg('${p.url}')">
${isAdmin?`<button class="delete-btn" onclick="deletePhoto('${p.id}')">🗑</button>`:""}
</div>
`).join("")}
</div>`;
});
}

/* LIGHTBOX */
function openImg(url){
const overlay=document.createElement("div");
overlay.className="img-overlay";
overlay.innerHTML=`<img src="${url}">`;
overlay.onclick=()=>overlay.remove();
document.body.appendChild(overlay);
document.body.style.overflow="hidden";
}

/* DELETE */
function deletePhoto(id){
if(!isAdmin)return;
db.collection("photos").doc(id).delete().then(render);
}

/* UPLOAD */
function uploadPhoto(){
let scelta=document.getElementById("folderSelect").value;

let widget=cloudinary.createUploadWidget({
cloudName:"dagfasmlx",
uploadPreset:"iv-memorial",
folder:"iv-memorial/"+scelta
},(err,res)=>{
if(res&&res.event==="success"){
db.collection("photos").add({
url:res.info.secure_url,
tag:scelta,
time:Date.now()
});
render();
}
});

widget.open();
}

</script>

</body>
</html>
