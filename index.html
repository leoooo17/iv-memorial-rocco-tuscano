<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f6;
color:#222;
}

/* HEADER */
header{
height:260px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d") center/cover no-repeat;
}

header::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

header h1{
position:relative;
font-size:36px;
letter-spacing:2px;
text-transform:uppercase;
color:#FFD700;
}

/* BOTTONI */
button{
padding:10px 14px;
border-radius:12px;
border:1px solid #ddd;
background:white;
color:#222;
cursor:pointer;
margin:4px;
font-weight:600;
transition:0.2s;
}

button:hover{
background:#FFD700;
transform:translateY(-2px);
}

/* MENU */
.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
gap:6px;
}

/* UPLOAD */
.upload{
text-align:center;
padding:15px;
}

#loginBox input, select{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* 🔥 SLIDER FOTO CASUALI */
.slider-container{
margin:10px auto 0 auto;
padding:10px;
overflow-x:auto;
white-space:nowrap;
scroll-behavior:smooth;
background:#fff;
border-top:1px solid #eee;
border-bottom:1px solid #eee;
}

.slider-container img{
height:110px;
width:160px;
object-fit:cover;
margin-right:8px;
border-radius:10px;
display:inline-block;
cursor:pointer;
transition:0.2s;
}

.slider-container img:hover{
transform:scale(1.05);
}

/* GALLERIA */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
padding:15px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>IV MEMORIAL ROCCO TUSCANO</h1>
</header>

<div class="upload">

<button onclick="showLogin()">🔒 Area Fotografo</button>

<div id="loginBox" style="display:none;">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>
</div>

<div id="uploadBox" style="display:none; text-align:center;">

<select id="folderSelect">
<option value="08-06">08/06</option>
<option value="09-06">09/06</option>
<option value="10-06">10/06</option>
<option value="11-06">11/06</option>
<option value="12-06">12/06</option>
<option value="13-06">13/06</option>
<option value="15-06">15/06</option>
<option value="16-06">16/06</option>
<option value="17-06">17/06</option>
<option value="ottavi">OTTAVI</option>
<option value="quarti">QUARTI</option>
<option value="semifinale">SEMIFINALE</option>
<option value="finale">FINALE</option>
</select>

<br>

<button onclick="uploadPhoto()">📸 Carica Foto</button>

</div>

</div>

<div class="menu">

<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>

<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>

</div>

<!-- 🔥 SLIDER FOTO CASUALI -->
<div class="slider-container" id="slider"></div>

<div class="gallery" id="gallery"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- CLOUDINARY -->
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBdcApiH4G4kuSUKxIxQhhmq_fiLNRerp8",
  authDomain: "memorial-rocco-tuscano.firebaseapp.com",
  projectId: "memorial-rocco-tuscano",
  storageBucket: "memorial-rocco-tuscano.firebasestorage.app",
  messagingSenderId: "72206140774",
  appId: "1:72206140774:web:ac817e3fcd7107e53e34a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let isAdmin = false;
let currentFolder = "08-06";

/* LOGIN */
function showLogin(){
document.getElementById("loginBox").style.display = "block";
}

function login(){
const pass = document.getElementById("pass").value;

if(pass === "alessio2026"){
isAdmin = true;
document.getElementById("uploadBox").style.display = "block";
document.getElementById("loginBox").style.display = "none";
alert("Accesso fotografo effettuato");
render();
}else{
alert("Password errata");
}
}

/* UPLOAD */
function uploadPhoto(){

if(!isAdmin){
alert("Devi fare login");
return;
}

let scelta = document.getElementById("folderSelect").value;

let widget = cloudinary.createUploadWidget({
cloudName: "dagfasmlx",
uploadPreset: "iv-memorial",
folder: "iv-memorial/" + scelta
}, (err,res)=>{

if(res && res.event === "success"){

db.collection("photos").add({
url: res.info.secure_url,
tag: scelta,
time: Date.now()
});

render();
loadSlider();
}
});

widget.open();
}

/* CAMBIA CARTELLA */
function setFolder(f){
currentFolder = f;
render();
}

/* DELETE */
function deletePhoto(id){
if(!confirm("Eliminare foto?")) return;
db.collection("photos").doc(id).delete().then(()=>{
render();
loadSlider();
});
}

/* GALLERY */
function render(){
const g = document.getElementById("gallery");
g.innerHTML = "";

db.collection("photos")
.where("tag","==",currentFolder)
.get()
.then(snapshot=>{

if(snapshot.empty){
g.innerHTML = "<p style='text-align:center'>Nessuna foto</p>";
return;
}

snapshot.forEach(doc=>{
let data = doc.data();

g.innerHTML += `
<div class="card">
<img src="${data.url}" onclick="openImg('${data.url}')">

${isAdmin ? `
<button onclick="deletePhoto('${doc.id}')">🗑 Elimina</button>
` : ""}

</div>
`;
});
});
}

/* 🔥 SLIDER FOTO CASUALI */
function loadSlider(){
const s = document.getElementById("slider");
s.innerHTML = "";

db.collection("photos").get().then(snapshot=>{

let all = [];
snapshot.forEach(doc=>{
all.push(doc.data().url);
});

shuffle(all);

all.slice(0,20).forEach(url=>{
s.innerHTML += `<img src="${url}" onclick="openImg('${url}')">`;
});

});
}

/* RANDOM */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*i);
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

/* ZOOM */
function openImg(url){
const m = document.createElement("div");
m.style = "position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center";
m.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%">`;
m.onclick = ()=>m.remove();
document.body.appendChild(m);
}

/* INIT */
render();
loadSlider();

</script>

</body>
</html>
