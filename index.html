<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
color:#1b1b1b;
}

/* =========================
   HERO
========================= */
header{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg")
center/cover no-repeat;
overflow:hidden;
}

header::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
180deg,
rgba(0,40,90,0.65),
rgba(0,0,0,0.55)
);
}

.hero-text{
position:relative;
z-index:2;
padding:20px;
animation: fadeUp 0.9s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(18px);}
to{opacity:1; transform:translateY(0);}
}

.hero-badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
font-size:12px;
letter-spacing:2px;
font-weight:700;
color:#0b3d91;
background:rgba(255,255,255,0.9);
margin-bottom:14px;
}

.hero-text h1{
font-size:68px;
color:#FFD700;
margin:0;
letter-spacing:3px;
text-transform:uppercase;
text-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* MENU */
.menu{
position:sticky;
top:0;
background:rgba(255,255,255,0.92);
backdrop-filter: blur(14px);
z-index:999;
padding:14px 10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
border-bottom:1px solid rgba(0,90,180,0.12);
}

button{
padding:9px 16px;
border-radius:999px;
border:2px solid #0b3d91;
background:white;
color:#0b3d91;
cursor:pointer;
font-weight:700;
font-size:13px;
transition:0.25s ease;
}

button:hover{
background:#0b3d91;
color:#FFD700;
}

button.active{
background:#FFD700;
color:#0b3d91;
border-color:#FFD700;
}

/* GALLERY */
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
gap:14px;
padding:20px;
}

.photo-card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
position:relative;
}

.photo-card img{
width:100%;
height:230px;
object-fit:cover;
cursor:pointer;
}

/* SLIDESHOW HERO RANDOM */
.slideshow{
height:260px;
margin:15px;
border-radius:16px;
overflow:hidden;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
transition:opacity 0.8s ease;
}

/* OVERLAY FOTO */
.img-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
cursor:pointer;
}

.img-overlay img{
max-width:95%;
max-height:95%;
}

</style>
</head>

<body>

<header>
  <div class="hero-text">
    <div class="hero-badge">TORNEO UFFICIALE • EDIZIONE 2026</div>
    <h1>IV MEMORIAL<br>ROCCO TUSCANO</h1>
  </div>
</header>

<div class="menu">
<button onclick="setFolder('')">HOME</button>
<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>
<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>
</div>

<!-- SLIDESHOW RANDOM -->
<div id="slideshow" class="slideshow"></div>

<div id="gallery"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBdcApiH4G4kuSUKxIxQhhmq_fiLNRerp8",
authDomain: "memorial-rocco-tuscano.firebaseapp.com",
projectId: "memorial-rocco-tuscano",
storageBucket: "memorial-rocco-tuscano.firebasestorage.app",
messagingSenderId: "72206140774",
appId: "1:72206140774:web:ac817e3fcd7107e53e34a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFolder = "";
let allImages = [];
let slideIndex = 0;

/* =========================
   RANDOM SLIDESHOW (HOME)
========================= */
function loadRandomImages(){
db.collection("photos").get().then(snapshot=>{
allImages = [];
snapshot.forEach(doc=>{
allImages.push(doc.data().url);
});

if(allImages.length === 0) return;

allImages = allImages.sort(()=>Math.random()-0.5);

setInterval(()=>{
if(currentFolder !== "") return;

const box = document.getElementById("slideshow");
box.innerHTML = `<img src="${allImages[slideIndex]}" />`;

slideIndex = (slideIndex + 1) % allImages.length;

}, 3000);
});
}

loadRandomImages();

/* =========================
   MENU
========================= */
function setFolder(f){
currentFolder = f;

/* active button */
document.querySelectorAll(".menu button").forEach(b=>{
b.classList.remove("active");
if(b.textContent.includes(f.replace("-","/"))){
b.classList.add("active");
}
});

render();
}

/* =========================
   GALLERY
========================= */
function render(){
const g=document.getElementById("gallery");
g.innerHTML="";

if(currentFolder === ""){
g.innerHTML = "";
return;
}

db.collection("photos").where("tag","==",currentFolder).get()
.then(snapshot=>{
let photos=[];
snapshot.forEach(doc=>{
photos.push(doc.data());
});

photos.sort((a,b)=>b.time-a.time);

g.innerHTML = `
<div class="gallery-grid">
${photos.map(p=>`
<div class="photo-card">
<img src="${p.url}" onclick="openImg('${p.url}')">
</div>
`).join("")}
</div>`;
});
}

/* =========================
   FULLSCREEN IMAGE
========================= */
function openImg(url){
const o=document.createElement("div");
o.className="img-overlay";
o.innerHTML=`<img src="${url}">`;
o.onclick=()=>o.remove();
document.body.appendChild(o);
}

</script>

</body>
</html>
