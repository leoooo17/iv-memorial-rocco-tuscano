<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
overflow:hidden;
}

/* 🔥 HERO IMAGE FULL SCREEN */
#hero{
position:fixed;
inset:0;
background:url("campo.jpg") center/cover no-repeat;
}

/* overlay scuro */
#hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.45);
}

/* titolo centrale */
#title{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

#title h1{
font-size:42px;
letter-spacing:2px;
margin:0;
color:#FFD700;
}

#title p{
margin-top:10px;
font-size:16px;
opacity:0.9;
}

/* 🔥 MENU BUTTON */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:1000;

padding:10px 14px;
border-radius:10px;
border:none;
background:#111;
color:white;
cursor:pointer;
font-weight:600;
}

/* 🔥 LOGIN BOX PICCOLO */
#loginBox{
position:fixed;
top:55px;
left:10px;
z-index:1000;

background:#111;
padding:10px;
border-radius:10px;
display:none;
width:160px;
}

#loginBox input{
width:100%;
padding:6px;
border:none;
border-radius:6px;
margin-bottom:6px;
font-size:12px;
}

#loginBox button{
width:100%;
padding:6px;
border:none;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

/* cartelle sopra immagine */
#folders{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
z-index:1000;
}

#folders button{
padding:8px 12px;
border-radius:10px;
border:none;
background:white;
cursor:pointer;
font-weight:600;
}

#folders button:hover{
background:#FFD700;
}

/* responsive */
@media(max-width:600px){
#title h1{font-size:28px;}
}
</style>
</head>

<body>

<!-- 🔥 HERO IMAGE -->
<div id="hero"></div>

<!-- 🔥 TITLE -->
<div id="title">
<h1>IV MEMORIAL ROCCO TUSCANO</h1>
<p>Evento sportivo ufficiale</p>
</div>

<!-- 🔥 MENU BUTTON -->
<button id="menuBtn" onclick="toggleLogin()">☰ Menu</button>

<!-- 🔥 LOGIN BOX -->
<div id="loginBox">

<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>

<div id="uploadBox" style="display:none;margin-top:6px;">
<p style="color:white;font-size:12px;margin:0 0 6px 0;">Area Fotografo</p>
</div>

</div>

<!-- 🔥 CARTELLE (SEMPLICI) -->
<div id="folders">

<button>08/06</button>
<button>09/06</button>
<button>10/06</button>
<button>11/06</button>
<button>12/06</button>
<button>13/06</button>
<button>Finale</button>

</div>

<script>

/* toggle menu */
function toggleLogin(){
const box = document.getElementById("loginBox");
box.style.display = (box.style.display === "block") ? "none" : "block";
}

/* login base */
function login(){
const pass = document.getElementById("pass").value;

if(pass === "alessio2026"){
document.getElementById("uploadBox").style.display = "block";
alert("Accesso fotografo attivato");
}else{
alert("Password errata");
}
}

</script>

</body>
</html>
