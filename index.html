<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f6;
color:#222;
}

html {
  scroll-behavior: smooth;
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: #f0f0f0;
}

::-webkit-scrollbar-thumb {
  background: #c1c1c1;
  border-radius: 10px;
}

/* HEADER */
header {
  height: 90vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;

  background: url("https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg")
  center/cover no-repeat;
}

header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.6),
    rgba(0,0,0,0.8)
  );
}

.hero-text {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 20px;
}

.hero-text h1 {
  font-size: 60px;
  font-weight: 800;
  color: white;
}

.hero-text p {
  color: rgba(255,255,255,0.85);
  max-width: 700px;
  margin: 15px auto;
  line-height: 1.5;
}

/* MENU (CARTELLE) */
.menu {
  position: sticky;
  top: 0;
  background: white;
  z-index: 999;
  padding: 12px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

button{
padding:10px 14px;
border-radius:12px;
border:1px solid #ddd;
background:white;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
background:#FFD700;
transform:translateY(-2px);
}

/* SEZIONE GALLERIA */
.gallery {
  text-align:center;
  padding:40px;
}

.album-box {
  max-width:900px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

.btn {
  display:inline-block;
  margin-top:20px;
  padding:15px 30px;
  background:#FFD700;
  color:black;
  text-decoration:none;
  font-weight:bold;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
  <div class="hero-text">
    <h1>IV MEMORIAL ROCCO TUSCANO</h1>
    <p>
      Galleria ufficiale del torneo. Tutte le foto sono disponibili nell’album Google Foto.
    </p>
  </div>
</header>

<div class="menu">
<button onclick="openAlbum()">📸 Galleria Foto</button>
<button onclick="openAlbum()">08/06</button>
<button onclick="openAlbum()">09/06</button>
<button onclick="openAlbum()">10/06</button>
<button onclick="openAlbum()">11/06</button>
<button onclick="openAlbum()">12/06</button>
<button onclick="openAlbum()">13/06</button>
<button onclick="openAlbum()">15/06</button>
<button onclick="openAlbum()">16/06</button>
<button onclick="openAlbum()">17/06</button>
<button onclick="openAlbum()">Ottavi</button>
<button onclick="openAlbum()">Quarti</button>
<button onclick="openAlbum()">Semifinale</button>
<button onclick="openAlbum()">Finale</button>
</div>

<div class="gallery">

  <div class="album-box">
    <h2>📸 Foto Ufficiali Memorial</h2>
    <p>Tutte le immagini sono gestite dal fotografo ufficiale.</p>

    <a class="btn"
       href="https://photos.app.goo.gl/hTzFU7m6nps6VRNt6"
       target="_blank">
       Apri Album Google Foto
    </a>
  </div>

</div>

<script>
function openAlbum(){
  window.open("https://photos.app.goo.gl/hTzFU7m6nps6VRNt6", "_blank");
}
</script>

</body>
</html>
