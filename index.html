<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Memorial Rocco Tuscano</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:black;
    color:white;
    text-align:center;
    padding:25px;
}

h1{ margin:0; }

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card a{
    display:block;
    text-align:center;
    padding:10px;
    background:black;
    color:white;
    text-decoration:none;
}
</style>

</head>

<body>

<header>
<h1>IV Memorial Rocco Tuscano</h1>
<p>Galleria fotografica ufficiale</p>
</header>

<section class="gallery">

<!-- FOTO DI PROVA -->
<div class="card">
<img src="https://via.placeholder.com/600x400" />
<a href="https://via.placeholder.com/600x400" download>Scarica</a>
</div>

</section>

</body>
</html>
