<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f5f6f8}

header{
height:200px;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d") center/cover;
position:relative;
}

header::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.55);
}

header h1{position:relative}

button{
padding:10px;
border:none;
border-radius:20px;
background:#222;
color:white;
cursor:pointer;
margin:5px;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:10px;
}

.upload{
text-align:center;
padding:10px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>IV Memorial Rocco Tuscano</h1>
</header>

<div class="upload">

<button onclick="uploadPhoto()">📸 Carica Foto</button>

</div>

<div class="menu">

<button onclick="setTag('08-06')">08/06</button>
<button onclick="setTag('09-06')">09/06</button>
<button onclick="setTag('ottavi')">OTTAVI</button>
<button onclick="setTag('finale')">FINALE</button>

</div>

<div class="gallery" id="gallery"></div>

<script>

const cloudName = "dagfasmlx";
const uploadPreset = "iv-memorial";

let currentTag = "08-06";

/* STORAGE LOCALE FOTO */
let photos = JSON.parse(localStorage.getItem("photos")) || [];

/* CAMBIA TAG */
function setTag(tag){
currentTag = tag;
render();
}

/* UPLOAD */
function uploadPhoto(){

let widget = cloudinary.createUploadWidget({
cloudName: cloudName,
uploadPreset: uploadPreset,
folder: "iv-memorial/" + currentTag
}, (err,res)=>{

if(res && res.event === "success"){

const url = res.info.secure_url;

photos.push({
url:url,
tag:currentTag
});

localStorage.setItem("photos", JSON.stringify(photos));

render();
}
});

widget.open();
}

/* RENDER GALLERIA */
function render(){

const g = document.getElementById("gallery");
g.innerHTML = "";

const filtered = photos.filter(p => p.tag === currentTag);

if(filtered.length === 0){
g.innerHTML = "<p style='text-align:center'>Nessuna foto</p>";
return;
}

filtered.forEach(p=>{

g.innerHTML += `
<div class="card">
<img src="${p.url}">
</div>
`;
});
}

/* INIT */
render();

</script>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

</body>
</html>
