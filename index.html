<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f6;
color:#222;
}

/* SCROLL FIX + SMOOTH */
html {
  scroll-behavior: smooth;
}

body {
  overflow-y: scroll;
}

/* SCROLLBAR PERSONALIZZATA */
::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: #f0f0f0;
}

::-webkit-scrollbar-thumb {
  background: #c1c1c1;
  border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
  background: #999;
}

/* HERO */
header {
  height: 90vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  background: url("https://images.unsplash.com/photo-1521412644187-c49fa049e84d") center/cover no-repeat;
}

header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.6),
    rgba(0,0,0,0.8)
  );
}

header h1 {
  position: relative;
  font-size: 60px;
  font-weight: 800;
  color: white;
  letter-spacing: 3px;
}

header h1::after {
  content: "SPORT • PASSIONE • RICORDO";
  display: block;
  font-size: 14px;
  margin-top: 10px;
  color: #FFD700;
  letter-spacing: 4px;
}

/* MENU */
.menu {
  position: sticky;
  top: 0;
  background: white;
  z-index: 999;
  padding: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
}

/* BUTTON */
button{
padding:10px 14px;
border-radius:12px;
border:1px solid #ddd;
background:white;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

button:hover{
background:#FFD700;
transform:translateY(-2px);
}

/* FEATURED PHOTO */
.featured-photo {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.featured-photo img {
  width: 90%;
  max-width: 1000px;
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: 0.3s;
}

.featured-photo img:hover {
  transform: scale(1.02);
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 50px;
  font-size: 18px;
  color: #666;
}

/* LOGIN */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:1000;
padding:10px 14px;
border-radius:10px;
border:none;
background:#111;
color:white;
cursor:pointer;
font-weight:600;
}

#loginBox{
position:fixed;
top:55px;
left:10px;
z-index:1000;
background:#111;
padding:10px;
border-radius:10px;
display:none;
width:160px;
}

#loginBox input{
width:100%;
padding:6px;
border:none;
border-radius:6px;
margin-bottom:6px;
font-size:12px;
}

#loginBox button{
width:100%;
padding:6px;
border:none;
border-radius:6px;
font-size:12px;
cursor:pointer;
}
</style>
</head>

<body>

<button id="menuBtn" onclick="toggleLogin()">☰ Menu</button>

<div id="loginBox">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>

<div id="uploadBox" style="display:none;margin-top:6px;">
<select id="folderSelect" style="width:100%;font-size:12px;">
<option value="08-06">08/06</option>
<option value="09-06">09/06</option>
<option value="10-06">10/06</option>
<option value="11-06">11/06</option>
<option value="12-06">12/06</option>
<option value="13-06">13/06</option>
<option value="15-06">15/06</option>
<option value="16-06">16/06</option>
<option value="17-06">17/06</option>
<option value="ottavi">OTTAVI</option>
<option value="quarti">QUARTI</option>
<option value="semifinale">SEMIFINALE</option>
<option value="finale">FINALE</option>
</select>

<button onclick="uploadPhoto()">📸 Carica</button>
</div>
</div>

<header>
<h1>IV MEMORIAL ROCCO TUSCANO</h1>
</header>

<div class="menu">
<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>
<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>
</div>

<div class="gallery" id="gallery"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBdcApiH4G4kuSUKxIxQhhmq_fiLNRerp8",
  authDomain: "memorial-rocco-tuscano.firebaseapp.com",
  projectId: "memorial-rocco-tuscano",
  storageBucket: "memorial-rocco-tuscano.firebasestorage.app",
  messagingSenderId: "72206140774",
  appId: "1:72206140774:web:ac817e3fcd7107e53e34a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFolder = "08-06";
let isAdmin = false;

function toggleLogin(){
const box = document.getElementById("loginBox");
box.style.display = (box.style.display === "block") ? "none" : "block";
}

function login(){
const pass = document.getElementById("pass").value;

if(pass === "alessio2026"){
isAdmin = true;
document.getElementById("uploadBox").style.display = "block";
alert("Accesso fotografo attivato");
}else{
alert("Password errata");
}
}

function setFolder(f){
currentFolder = f;
render();
}

/* RENDER ULTIMA FOTO */
function render() {
  const g = document.getElementById("gallery");
  g.innerHTML = "";

  db.collection("photos")
    .where("tag", "==", currentFolder)
    .orderBy("time", "desc")
    .limit(1)
    .get()
    .then(snapshot => {

      if (snapshot.empty) {
        g.innerHTML = `
          <div class="empty-state">
            Nessuna foto disponibile per questa sezione
          </div>`;
        return;
      }

      snapshot.forEach(doc => {
        const data = doc.data();

        g.innerHTML = `
          <div class="featured-photo">
            <img src="${data.url}" onclick="openImg('${data.url}')">
          </div>
        `;
      });

    });
}

function uploadPhoto(){

if(!isAdmin){
alert("Devi fare login");
return;
}

let scelta = document.getElementById("folderSelect").value;

let widget = cloudinary.createUploadWidget({
cloudName: "dagfasmlx",
uploadPreset: "iv-memorial",
folder: "iv-memorial/" + scelta
}, (err,res)=>{

if(res && res.event === "success"){

db.collection("photos").add({
url: res.info.secure_url,
tag: scelta,
time: Date.now()
});

render();
}
});

widget.open();
}

function openImg(url){
const m = document.createElement("div");
m.style = "position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center";
m.innerHTML = `<img src="${url}" style="max-width:90%;max-height:90%">`;
m.onclick = ()=>m.remove();
document.body.appendChild(m);
}

render();

</script>

</body>
</html>
