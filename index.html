<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
color:#1b1b1b;
}

/* 🔥 NASCONDI TUTTO QUANDO FOTO APERTA */
body.photo-open header,
body.photo-open .menu,
body.photo-open .gallery-title,
body.photo-open #menuBtn,
body.photo-open #loginBox,
body.photo-open .ig-fotografo{
display:none !important;
}

/* =========================
   HERO
========================= */
header{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg")
center/cover no-repeat;
overflow:hidden;
}

header::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
180deg,
rgba(0,40,90,0.65),
rgba(0,0,0,0.55)
);
}

.hero-text{
position:relative;
z-index:2;
padding:20px;
animation: fadeUp 0.9s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(18px);}
to{opacity:1; transform:translateY(0);}
}

.hero-badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
font-size:12px;
letter-spacing:2px;
font-weight:700;
color:#0b3d91;
background:rgba(255,255,255,0.9);
margin-bottom:14px;
}

.hero-text h1{
font-size:68px;
color:#FFD700;
margin:0;
letter-spacing:3px;
text-transform:uppercase;
text-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.hero-text h1::after{
content:"";
display:block;
width:120px;
height:3px;
background:#FFD700;
margin:14px auto 0;
border-radius:10px;
}

.hero-subtitle{
color:rgba(255,255,255,0.92);
max-width:780px;
margin:18px auto 0;
line-height:1.6;
font-size:18px;
}

/* =========================
   GALLERY TITLE
========================= */
.gallery-title{
text-align:center;
font-size:22px;
font-weight:700;
letter-spacing:3px;
margin-top:25px;
margin-bottom:10px;
color:#0b3d91;
position:relative;
}

.gallery-title::after{
content:"";
display:block;
width:60px;
height:3px;
background:#0b3d91;
margin:8px auto 0;
border-radius:10px;
}

/* =========================
   MENU
========================= */
.menu{
position:sticky;
top:0;
background:rgba(255,255,255,0.92);
backdrop-filter: blur(14px);
z-index:999;
padding:14px 10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
border-bottom:1px solid rgba(0,90,180,0.12);
}

button{
padding:9px 16px;
border-radius:999px;
border:2px solid #0b3d91;
background:white;
color:#0b3d91;
cursor:pointer;
font-weight:700;
font-size:13px;
transition:0.25s;
}

button:hover{
background:#0b3d91;
color:#FFD700;
transform:translateY(-2px) scale(1.06);
}

button.active{
background:#FFD700;
color:#0b3d91;
border-color:#FFD700;
}

/* =========================
   GALLERIA
========================= */
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
gap:14px;
padding:20px;
}

.photo-card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:0.3s;
position:relative;
}

.photo-card img{
width:100%;
height:230px;
object-fit:cover;
cursor:pointer;
}

.photo-card:hover{
transform:translateY(-5px);
}

.delete-btn{
position:absolute;
top:8px;
right:8px;
padding:6px 8px;
font-size:12px;
border:none;
border-radius:8px;
background:#e74c3c;
color:white;
cursor:pointer;
}

/* LOGIN */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:2000;
padding:10px 14px;
background:#0b3d91;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#loginBox{
position:fixed;
top:55px;
left:10px;
z-index:2000;
background:white;
padding:10px;
border-radius:10px;
display:none;
width:160px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

#loginBox input{
width:100%;
padding:6px;
border:1px solid #ddd;
border-radius:6px;
margin-bottom:6px;
}

#loginBox button{
width:100%;
padding:6px;
border:none;
border-radius:6px;
background:#0b3d91;
color:white;
font-weight:600;
}

/* INSTAGRAM */
.ig-fotografo{
position:fixed;
top:12px;
right:12px;
z-index:3000;
background:#0b3d91;
color:white;
padding:10px 14px;
border-radius:999px;
text-decoration:none;
font-size:13px;
font-weight:600;
}

/* =========================
   OVERLAY FOTO FULLSCREEN
========================= */
#photoViewer{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

#photoViewer img{
max-width:95%;
max-height:95%;
border-radius:10px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
cursor:pointer;
}

</style>
</head>

<body>

<a class="ig-fotografo"
href="https://www.instagram.com/alessio__orlando"
target="_blank">
📸 PH Alessio Orlando
</a>

<button id="menuBtn" onclick="toggleLogin()">☰ Menu</button>

<div id="loginBox">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>
</div>

<header>
  <div class="hero-text">
    <div class="hero-badge">TORNEO UFFICIALE • EDIZIONE 2026</div>
    <h1>IV MEMORIAL<br>ROCCO TUSCANO</h1>
    <p class="hero-subtitle">Sport, emozione e ricordo.</p>
  </div>
</header>

<div class="gallery-title">GALLERY</div>

<div class="menu">
<button onclick="setFolder('08-06')">08/06</button>
<button onclick="setFolder('09-06')">09/06</button>
<button onclick="setFolder('10-06')">10/06</button>
<button onclick="setFolder('11-06')">11/06</button>
<button onclick="setFolder('12-06')">12/06</button>
<button onclick="setFolder('13-06')">13/06</button>
<button onclick="setFolder('15-06')">15/06</button>
<button onclick="setFolder('16-06')">16/06</button>
<button onclick="setFolder('17-06')">17/06</button>
<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALE</button>
<button onclick="setFolder('finale')">FINALE</button>
</div>

<div id="gallery"></div>

<!-- VIEWER FOTO -->
<div id="photoViewer" onclick="closePhoto()">
<img id="photoViewerImg">
</div>

<script>
function openImg(url){
document.body.classList.add("photo-open");
document.getElementById("photoViewer").style.display="flex";
document.getElementById("photoViewerImg").src=url;
}

function closePhoto(){
document.body.classList.remove("photo-open");
document.getElementById("photoViewer").style.display="none";
}
</script>

</body>
</html>
