<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>IV Memorial Rocco Tuscano</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b1220;
color:#fff;
}

/* ================= HERO CHAMPIONS ================= */
header{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
background:url("https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg")
center/cover no-repeat;
overflow:hidden;
}

header::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(180deg, rgba(5,10,25,.55), rgba(0,0,0,.85));
}

.hero-text{
position:relative;
z-index:2;
max-width:900px;
padding:20px;
animation:fadeUp .8s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.logo-memorial{
width:120px;
margin-bottom:20px;
filter:drop-shadow(0 10px 30px rgba(0,0,0,.6));
}

.hero-badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.2);
font-size:12px;
letter-spacing:2px;
margin-bottom:15px;
}

.hero-text h1{
font-size:clamp(38px,8vw,80px);
margin:0;
font-weight:900;
letter-spacing:4px;
color:#FFD700;
text-transform:uppercase;
text-shadow:0 10px 40px rgba(0,0,0,.8);
}

.hero-subtitle{
margin-top:18px;
font-size:18px;
opacity:.9;
}

.hero-date{
margin-top:10px;
font-size:14px;
opacity:.7;
}

/* ================= STATS ================= */
.stats{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding:30px;
background:#0f1a33;
border-bottom:1px solid rgba(255,255,255,.08);
}

.stat{
text-align:center;
}

.stat .num{
font-size:28px;
font-weight:900;
color:#FFD700;
}

.stat .label{
font-size:12px;
letter-spacing:2px;
opacity:.7;
text-transform:uppercase;
}

/* ================= MENU ================= */
.menu{
position:sticky;
top:0;
z-index:999;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
padding:12px;
background:rgba(10,15,30,.8);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.08);
}

button{
padding:10px 16px;
border-radius:999px;
border:none;
background:rgba(255,255,255,.08);
color:#fff;
cursor:pointer;
font-weight:700;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

button.active{
background:linear-gradient(135deg,#FFD700,#ffea70);
color:#111;
}

/* ================= GALLERY ================= */
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:14px;
padding:25px;
}

.photo-card{
border-radius:16px;
overflow:hidden;
background:#111a2e;
position:relative;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.photo-card:hover{
transform:translateY(-6px);
}

.photo-card img{
width:100%;
height:240px;
object-fit:cover;
transition:.4s;
cursor:pointer;
}

.photo-card:hover img{
transform:scale(1.08);
}

.delete-btn{
position:absolute;
top:8px;
right:8px;
border:none;
background:#e74c3c;
color:white;
padding:6px 8px;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

/* ================= FEATURED ================= */
.featured{
text-align:center;
padding:40px 20px;
}

.featured h2{
color:#FFD700;
margin-bottom:20px;
}

.featured img{
width:100%;
max-width:900px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.5);
}

/* ================= LIGHTBOX ================= */
.img-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
}

.img-overlay img{
max-width:95%;
max-height:95%;
border-radius:10px;
}

/* ================= LOGIN ================= */
#menuBtn{
position:fixed;
top:10px;
left:10px;
z-index:2000;
padding:10px 14px;
border:none;
border-radius:10px;
background:#111a2e;
color:#fff;
cursor:pointer;
}

#loginBox{
position:fixed;
top:55px;
left:10px;
z-index:2000;
background:#111a2e;
padding:10px;
border-radius:10px;
display:none;
width:160px;
}

#loginBox input{
width:100%;
padding:6px;
margin-bottom:6px;
border-radius:6px;
border:none;
}

#uploadBox{
display:none;
}

#folderSelect{
width:100%;
padding:6px;
}

/* ================= FOOTER ================= */
footer{
margin-top:50px;
padding:30px;
text-align:center;
background:#0f1a33;
font-size:13px;
opacity:.8;
}

/* ================= RESPONSIVE ================= */
@media(max-width:600px){
.hero-text h1{font-size:40px;}
}
</style>
</head>

<body>

<button id="menuBtn" onclick="toggleLogin()">☰ Menu</button>

<div id="loginBox">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Accedi</button>

<div id="uploadBox">
<select id="folderSelect">
<option value="gironi">GIRONI</option>
<option value="ottavi">OTTAVI</option>
<option value="quarti">QUARTI</option>
<option value="semifinale">SEMIFINALI</option>
<option value="finale">FINALE</option>
</select>
<button onclick="uploadPhoto()">Carica</button>
</div>
</div>

<header>
<div class="hero-text">
<div class="hero-badge">TORNEO UFFICIALE 2026</div>

<h1>IV MEMORIAL<br>ROCCO TUSCANO</h1>

<div class="hero-subtitle">Sport • Emozioni • Ricordo</div>
<div class="hero-date">Ardore Marina • Giugno 2026</div>
</div>
</header>

<section class="stats">
<div class="stat"><div class="num">IV</div><div class="label">Edizione</div></div>
<div class="stat"><div class="num">⚽</div><div class="label">Torneo</div></div>
<div class="stat"><div class="num">📸</div><div class="label">Gallery</div></div>
</section>

<div class="menu">
<button onclick="setFolder('gironi')">GIRONI</button>
<button onclick="setFolder('ottavi')">OTTAVI</button>
<button onclick="setFolder('quarti')">QUARTI</button>
<button onclick="setFolder('semifinale')">SEMIFINALI</button>
<button onclick="setFolder('finale')">FINALE</button>
</div>

<div class="featured">
<h2>📸 FOTO IN EVIDENZA</h2>
<img src="https://i.postimg.cc/xCrh11Qs/Whats-App-Image-2026-06-09-at-17-06-44.jpg">
</div>

<div id="gallery"></div>

<footer>
IV Memorial Rocco Tuscano © 2026 — Foto ufficiali Alessio Orlando — Ardore Marina
</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyBdcApiH4G4kuSUKxIxQhhmq_fiLNRerp8",
authDomain: "memorial-rocco-tuscano.firebaseapp.com",
projectId: "memorial-rocco-tuscano",
storageBucket: "memorial-rocco-tuscano.firebasestorage.app",
messagingSenderId: "72206140774",
appId: "1:72206140774:web:ac817e3fcd7107e53e34a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentFolder="gironi";
let isAdmin=false;

/* LOGIN */
function toggleLogin(){
document.getElementById("loginBox").style.display =
document.getElementById("loginBox").style.display==="block"?"none":"block";
}

function login(){
if(document.getElementById("pass").value==="alessio2026"){
isAdmin=true;
document.getElementById("uploadBox").style.display="block";
render();
}
}

/* FOLDER */
function setFolder(f){
currentFolder=f;
document.querySelectorAll(".menu button").forEach(b=>{
b.classList.remove("active");
if(b.textContent.toLowerCase().includes(f)) b.classList.add("active");
});
render();
}

/* RENDER */
function render(){
const g=document.getElementById("gallery");
g.innerHTML="";

db.collection("photos")
.where("tag","==",currentFolder)
.get()
.then(snap=>{
if(snap.empty){
g.innerHTML="<p style='text-align:center'>Nessuna foto</p>";
return;
}

let photos=[];
snap.forEach(d=>photos.push({id:d.id,...d.data()}));
photos.sort((a,b)=>b.time-a.time);

g.innerHTML=`<div class="gallery-grid">
${photos.map(p=>`
<div class="photo-card">
<img src="${p.url}" loading="lazy" onclick="openImg('${p.url}')">
${isAdmin?`<button class="delete-btn" onclick="deletePhoto('${p.id}')">🗑</button>`:""}
</div>`).join("")}
</div>`;
});
}

/* LIGHTBOX */
function openImg(url){
const overlay=document.createElement("div");
overlay.className="img-overlay";
overlay.innerHTML=`<img src="${url}">`;
overlay.onclick=()=>{overlay.remove();document.body.style.overflow="auto";};
document.body.style.overflow="hidden";
document.body.appendChild(overlay);
}

document.addEventListener("keydown",e=>{
if(e.key==="Escape"){
const o=document.querySelector(".img-overlay");
if(o){o.remove();document.body.style.overflow="auto";}
}
});

/* DELETE */
function deletePhoto(id){
if(!isAdmin)return;
db.collection("photos").doc(id).delete().then(render);
}

/* UPLOAD */
function uploadPhoto(){
let folder=document.getElementById("folderSelect").value;

let widget=cloudinary.createUploadWidget({
cloudName:"dagfasmlx",
uploadPreset:"iv-memorial",
folder:"iv-memorial/"+folder
},(err,res)=>{
if(res&&res.event==="success"){
db.collection("photos").add({
url:res.info.secure_url,
tag:folder,
time:Date.now()
});
render();
}
});

widget.open();
}

render();
</script>

</body>
</html>
