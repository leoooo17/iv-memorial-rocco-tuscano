<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Memorial Rocco Tuscano</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

header{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

h1{ margin:0; }

.menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:6px;
    padding:10px;
}

button{
    padding:8px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:black;
    color:white;
    font-size:12px;
}

button:hover{
    background:#333;
}

.upload{
    text-align:center;
    padding:10px;
}

.upload button{
    background:#007bff;
    color:white;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

input{
    padding:8px;
    margin:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:transform 0.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    cursor:pointer;
}

.card a{
    display:block;
    text-align:center;
    padding:8px;
    background:black;
    color:white;
    text-decoration:none;
    font-size:13px;
}
</style>
</head>

<body>

<header>
<h1>IV Memorial Rocco Tuscano</h1>
<p>Galleria ufficiale del torneo</p>
</header>

<div class="upload">

<button onclick="showLogin()">🔒 Area Fotografo</button>

<div id="loginBox" style="display:none; margin-top:10px;">
    <input type="password" id="passwordInput" placeholder="Inserisci password">
    <button onclick="checkPassword()">Accedi</button>
</div>

<div id="uploadArea" style="display:none; margin-top:10px;">
    <button onclick="uploadPhoto()">📸 Carica Foto</button>
</div>

</div>

<div class="menu">

<button onclick="filter('08-06')">08/06</button>
<button onclick="filter('09-06')">09/06</button>
<button onclick="filter('10-06')">10/06</button>
<button onclick="filter('11-06')">11/06</button>
<button onclick="filter('12-06')">12/06</button>
<button onclick="filter('13-06')">13/06</button>
<button onclick="filter('15-06')">15/06</button>
<button onclick="filter('16-06')">16/06</button>
<button onclick="filter('17-06')">17/06</button>

<button onclick="filter('ottavi')">OTTAVI</button>
<button onclick="filter('quarti')">QUARTI</button>
<button onclick="filter('semifinale')">SEMIFINALE</button>
<button onclick="filter('finale')">FINALE</button>

</div>

<section class="gallery" id="gallery"></section>

<script>

const cloudName = "dagfasmlx";
const uploadPreset = "iv-memorial";

let currentFolder = "08-06";
let isPhotographer = false;

/* LOGIN */
function showLogin(){
    document.getElementById("loginBox").style.display = "block";
}

function checkPassword(){
    const pass = document.getElementById("passwordInput").value;

    if(pass === "alessio2026"){
        isPhotographer = true;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("uploadArea").style.display = "block";
        alert("Accesso effettuato ✔");
    } else {
        alert("Password errata ❌");
    }
}

/* CAMBIA SEZIONE */
function filter(folder){
    currentFolder = folder;
    loadImages(folder);
}

/* UPLOAD FOTO */
function uploadPhoto(){

    if(!isPhotographer){
        alert("Devi fare login prima");
        return;
    }

    let widget = cloudinary.createUploadWidget({
        cloudName: cloudName,
        uploadPreset: uploadPreset,
        folder: "iv-memorial-rocco-tuscano/" + currentFolder,
        sources: ['local', 'camera'],
        multiple: true
    },
    (error, result) => {
        if (!error && result && result.event === "success") {
            loadImages(currentFolder);
        }
    });

    widget.open();
}

/* ZOOM FOTO */
function openImage(url){
    const modal = document.createElement("div");
    modal.style.position = "fixed";
    modal.style.top = 0;
    modal.style.left = 0;
    modal.style.width = "100%";
    modal.style.height = "100%";
    modal.style.background = "rgba(0,0,0,0.9)";
    modal.style.display = "flex";
    modal.style.alignItems = "center";
    modal.style.justifyContent = "center";
    modal.style.zIndex = 9999;
    modal.style.cursor = "pointer";

    modal.innerHTML = `<img src="${url}" style="max-width:90%; max-height:90%; border-radius:10px;">`;

    modal.onclick = () => modal.remove();

    document.body.appendChild(modal);
}

/* CARICA FOTO */
function loadImages(folder){

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    fetch(`https://res.cloudinary.com/${cloudName}/image/list/${folder}.json`)
    .then(res => res.json())
    .then(data => {

        if(!data.resources || data.resources.length === 0){
            gallery.innerHTML = "<p style='text-align:center'>Nessuna foto</p>";
            return;
        }

        data.resources.forEach(img => {

            const url = `https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.${img.format}`;

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${url}" onclick="openImage('${url}')">
                <a href="${url}" download>Scarica</a>
            `;

            gallery.appendChild(div);
        });
    })
    .catch(() => {
        gallery.innerHTML = "<p style='text-align:center'>Errore caricamento foto</p>";
    });
}

/* INIT */
loadImages(currentFolder);

</script>

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

</body>
</html>
