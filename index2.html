<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Memorial Rocco Tuscano</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

h1{ margin:0; }

.admin{
    padding:10px;
    text-align:center;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

.upload{
    background:#007bff;
    color:white;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card a{
    display:block;
    text-align:center;
    padding:10px;
    background:black;
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>IV Memorial Rocco Tuscano</h1>
<p>Galleria fotografica ufficiale</p>
</header>

<div class="admin">
    <button class="upload" onclick="uploadPhoto()">📸 Carica foto (Fotografo)</button>
</div>

<section class="gallery" id="gallery">

<!-- FOTO DI PROVA -->
<div class="card">
<img src="https://via.placeholder.com/600x400">
<a href="https://via.placeholder.com/600x400" download>Scarica</a>
</div>

</section>

<script>

// CONFIG CLOUDINARY
const cloudName = "dagfasmlx";
const uploadPreset = "iv-memorial";

// CARICAMENTO FOTO
function uploadPhoto(){

    let widget = cloudinary.createUploadWidget({
        cloudName: cloudName,
        uploadPreset: uploadPreset,
        sources: ['local', 'camera'],
        multiple: true,
        folder: "iv-memorial-rocco-tuscano"
    },
    (error, result) => {
        if (!error && result && result.event === "success") {
            addImage(result.info.secure_url);
        }
    });

    widget.open();
}

// AGGIUNGI FOTO ALLA GALLERIA
function addImage(url){
    const gallery = document.getElementById("gallery");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <img src="${url}">
        <a href="${url}" download>Scarica</a>
    `;

    gallery.prepend(div);
}

</script>

<!-- Cloudinary widget -->
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

</body>
</html>
